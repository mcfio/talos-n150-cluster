---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: flate
on:
  pull_request: {}

permissions:
  contents: read

jobs:
  flate:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.resource }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        resource:
          - kustomization
          - helmrelease
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Kubernetes Changes
        id: changed
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555caaef8e5bbe # v46.0.5
        with:
          files: kubernetes/**

      - name: Generate Token
        id: app-token
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Setup Flate
        if: steps.changed.outputs.any_changed == 'true'
        uses: home-operations/flate/action@0fc37fae10cf3c265294f6adebc6d6c100c74ea5 # v0.4.10
        with:
          version: 0.4.10
          cache: true

      - name: Render Flate Diff
        id: diff
        if: steps.changed.outputs.any_changed == 'true'
        env:
          FLATE_PATH: ${{ github.workspace }}/kubernetes/flux/config
        run: |
          raw="$(mktemp)"
          flate diff "${{ matrix.resource }}" -o github | sed '/./,$!d' > "$raw"
          if [[ ! -s "$raw" ]]; then
            echo "No diff for ${{ matrix.resource }} — exiting cleanly"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            printf '```diff\n'
            cat "$raw"
            printf '\n```\n'
          } > flate-body.md

      - name: Upsert PR comment
        if: steps.changed.outputs.any_changed == 'true' && steps.diff.outputs.skip != 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: flate:${{ matrix.resource }}
          path: flate-body.md
