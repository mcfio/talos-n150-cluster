---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: flate
on:
  pull_request: {}

permissions:
  contents: read

jobs:
  flate:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.resource }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        resource:
          - kustomization
          - helmrelease
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Kubernetes Changes
        id: changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: kubernetes/**

      - name: Generate Token
        id: app-token
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Setup Flate
        if: steps.changed.outputs.any_changed == 'true'
        uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
        with:
          version: 0.4.10
          cache: true

      - name: Render Flate Diff
        id: diff
        if: steps.changed.outputs.any_changed == 'true'
        env:
          FLATE_PATH: ${{ github.workspace }}/kubernetes/flux/config
        run: |
          raw="$(mktemp)"
          flate diff "${{ matrix.resource }}" -o github | sed '/./,$!d' > "$raw"
          if [[ ! -s "$raw" ]]; then
            echo "No diff for ${{ matrix.resource }} — exiting cleanly"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # GitHub caps a comment body at 65536 chars. A wide renovate batch can
          # exceed that, so trim the diff to fit and link the full render.
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          notice="> Diff truncated — it exceeds GitHub's 65536-char comment limit. Full render in the [workflow run](${run_url})."
          # Reserve headroom for the code fence, the notice, and the sticky-comment marker.
          max_raw=$(( 65536 - ${#notice} - 256 ))
          if [[ $(wc -c < "$raw") -gt $max_raw ]]; then
            head -c "$max_raw" "$raw" | sed '$d' > "$raw.trunc"
            mv "$raw.trunc" "$raw"
            truncated=true
          fi
          {
            printf '```diff\n'
            cat "$raw"
            printf '\n```\n'
            if [[ "${truncated:-}" == "true" ]]; then printf '\n%s\n' "$notice"; fi
          } > flate-body.md

      - name: Upsert PR comment
        if: steps.changed.outputs.any_changed == 'true' && steps.diff.outputs.skip != 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: flate:${{ matrix.resource }}
          path: flate-body.md

      # Curator input. Record the PR number + this resource's flate outcome so the
      # downstream workflow_run can distinguish "clean diff" from "flate failed"
      # (e.g. a dangling dependsOn renders non-zero — a hard no-merge, NOT no-change).
      - name: Stage curator payload
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          mkdir -p curator
          echo "${{ github.event.pull_request.number }}" > curator/pr-number
          echo "${{ steps.changed.outputs.any_changed }}" > curator/changed
          echo "${{ steps.diff.outputs.skip }}" > curator/skip.${{ matrix.resource }}
          # flate-body.md is absent when skip=true; guard the copy.
          cp flate-body.md "curator/diff.${{ matrix.resource }}.md" 2>/dev/null || true

      - name: Upload curator payload
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: curator-${{ matrix.resource }}
          path: curator/
          retention-days: 1
