---
extends: default

rules:
  brackets:
    max-spaces-inside: 1
    min-spaces-inside: 0
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  comments-indentation: disable # Workaround-For: https://github.com/adrienverge/yamllint/issues/384
  document-start:
    ignore: |
      *components*
  indentation:
    spaces: consistent
    indent-sequences: consistent
    check-multi-line-strings: false
  line-length: disable
  quoted-strings:
    quote-type: any
    required: only-when-needed
    ignore: |
      *crds*
  truthy:
    allowed-values:
    - "true"
    - "false"
    - "on"
