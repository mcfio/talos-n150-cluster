---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
stages:
  - labels
  - lint
  - test
  - renovate

variables:
  CI_MISE_IMAGE: ghcr.io/jdx/mise:2026.6.12@sha256:8e2087d0831aa3f05c55ee41e5c30b93f1317d369973ede36cbb8936c51dd54a

.mise:
  variables:
    MISE_DATA_DIR: $CI_PROJECT_DIR/.cache/mise
    UV_LINK_MODE: copy
  image:
    name: $CI_MISE_IMAGE
    entrypoint: [""]
  cache:
    key:
      files:
        - .mise/mise.lock
    paths:
      - .cache/mise/
  before_script:
    - mise install
    - eval "$(mise activate bash --shims)"

include:
  - .gitlab/ci/labels.yaml
  - .gitlab/ci/lint.yaml
  - .gitlab/ci/flate.yaml
  - .gitlab/ci/renovate.yaml
