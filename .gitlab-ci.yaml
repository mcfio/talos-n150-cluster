---
stages:
- lint
- flux-local
- renovate

include:
- project: mcf.io/renovate-config
  file: /templates/renovate.gitlab-ci.yaml
- .gitlab/flux-local.gitlab-ci.yaml
- .gitlab/lint.gitlab-ci.yaml

variables:
  RENOVATE_AUTODISCOVER: true
  RENOVATE_AUTODISCOVER_FILTER: $CI_PROJECT_PATH
  FORCE_COLOR: 3

renovate:
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    changes:
      paths:
      - .gitlab/renovate.json
      - .renovate/**/*
      compare_to: $CI_COMMIT_BEFORE_SHA
