---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
stages:
- labels
- lint
- test
- renovate

variables:
  CI_MISE_IMAGE: ghcr.io/jdx/mise:2026.6.2@sha256:3c5c4bad6d5dbcafeac143d9ea36e05cdb42a09dfd8f63de19a7ef4013d1f9e7

.mise:
  variables:
    MISE_DATA_DIR: $CI_PROJECT_DIR/.cache/mise
    UV_LINK_MODE: copy
  image:
    name: $CI_MISE_IMAGE
    entrypoint: [""]
  cache:
    key:
      files:
      - .mise/mise.lock
    paths:
    - .cache/mise/
  before_script:
  - mise install
  - eval "$(mise activate bash --shims)"

include:
- .gitlab/ci/labels.yaml
- .gitlab/ci/lint.yaml
- .gitlab/ci/flate.yaml
- .gitlab/ci/renovate.yaml
