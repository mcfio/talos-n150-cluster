---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: talos-n150-cluster
      auth:
        serviceAccountSecretRef:
          name: onepassword-connect-service-account
          key: credential
          namespace: external-secrets
      cache:
        ttl: 6h # increase ttl to 6 hours to address rate limiting
        maxSize: 100
