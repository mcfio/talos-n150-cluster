---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      vault: talos-n150-cluster
      auth:
        serviceAccountSecretRef:
          name: onepassword-connect-service-account
          key: credential
          namespace: external-secrets
      cache:
        ttl: 6h # increase ttl to 6 hours to address rate limiting
        maxSize: 100
---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword-connect
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        talos-n150-cluster: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-credentials
            key: token
            namespace: external-secrets
