---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forgejo-runner:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-binary:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: "12"
            command:
              - cp
              - /bin/forgejo-runner
              - /shared/forgejo-runner
        containers:
          app:
            image:
              repository: docker.io/library/node
              tag: 24-bookworm
            command:
              - /shared/forgejo-runner
              - daemon
              - --config
              - /config/config.yaml
            env:
              HOME: /data
              TZ: Canada/Eastern
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    persistence:
      runner-bin:
        type: emptyDir
        advancedMounts:
          forgejo-runner:
            copy-binary:
              - path: /shared
            app:
              - path: /shared
                readOnly: true
      config:
        type: secret
        name: forgejo-runner
        advancedMounts:
          forgejo-runner:
            app:
              - path: /config/config.yaml
                subPath: config.yaml
                readOnly: true
      data:
        type: emptyDir
        globalMounts:
          - path: /data
