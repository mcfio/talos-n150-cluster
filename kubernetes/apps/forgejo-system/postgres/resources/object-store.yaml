---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: forgejo-postgres
spec:
  # Recovery window: obsolete base backups are pruned once a newer one exists
  # past the 14d point of recoverability. WAL archiving is continuous regardless.
  retentionPolicy: 14d
  configuration:
    # Shared bucket for all CNPG clusters; the Cluster's serverName plugin
    # parameter isolates this database under s3://.../forgejo-postgres/.
    destinationPath: s3://milton-cnpg-backups/
    endpointURL: https://d1f0621fbc1ba3f26f44754274430881.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: forgejo-postgres-r2
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: forgejo-postgres-r2
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
