---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-secret
    creationPolicy: Owner
  data:
    # Break-glass local admin (kept alongside OIDC for recovery-first access)
    - secretKey: username
      remoteRef:
        key: forgejo/admin/username
    - secretKey: password
      remoteRef:
        key: forgejo/admin/password
    # Database password — same 1Password field the CNPG cluster is seeded from
    - secretKey: FORGEJO__DATABASE__PASSWD
      remoteRef:
        key: forgejo/postgres/password
