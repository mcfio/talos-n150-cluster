---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-external
spec:
  hostnames:
    - git.mcf.io
  parentRefs:
    - name: external
      namespace: ingress-system
  rules:
    # Away path only: the local password form is unreachable from off-LAN.
    # An Exact match on /user/login outranks the catch-all backend rule below
    # (Gateway API precedence), so an off-LAN browser hitting the login page
    # (including REQUIRE_SIGNIN_VIEW bounces) is funnelled straight into the
    # Cloudflare Access SSO flow instead. SignInOAuth is a GET route, so the
    # redirect resolves; a credential POST never reaches the backend. The
    # internal HTTPRoute is unchanged, so LAN break-glass keeps the real form.
    - matches:
        - path:
            type: Exact
            value: /user/login
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /user/oauth2/cloudflare
    - backendRefs:
        - name: forgejo-http
          port: 3000
