---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: forgejo
  timeout: 10m
  values:
    # Bundled databases off — Forgejo uses the CloudNativePG cluster instead.
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    # No redis-cluster; the chart falls back to in-memory session/cache and a
    # level (on-disk) queue. Fine at a single replica.
    redis-cluster:
      enabled: false
    redis:
      enabled: false

    persistence:
      enabled: true
      create: false
      claimName: forgejo

    image:
      rootless: true

    service:
      ssh:
        type: ClusterIP
        port: 22

    # Routes are managed explicitly (split-horizon across two gateways).
    httpRoute:
      enabled: false

    gitea:
      admin:
        existingSecret: forgejo-secret
      # Inject the DB password from the ExternalSecret rather than inlining it.
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: FORGEJO__DATABASE__PASSWD
      config:
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgres-rw.forgejo-system.svc:5432
          NAME: forgejo
          USER: forgejo
        server:
          ROOT_URL: https://git.mcf.io
          SSH_DOMAIN: git.mcf.io
          SSH_PORT: 22
        service:
          # Private instance: no anonymous browsing, no open registration.
          REQUIRE_SIGNIN_VIEW: true
          DISABLE_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls
        mailer:
          ENABLED: false

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
