---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: forgejo
  timeout: 10m
  values:
    persistence:
      enabled: true
      create: false
      claimName: forgejo

    image:
      rootless: true

    dnsConfig:
      options:
        - name: ndots
          value: "2"

    service:
      ssh:
        type: ClusterIP
        port: 22

    httpRoute:
      enabled: true
      annotations:
        external-dns.alpha.kubernetes.io/controller: none
      hostnames:
        - git.mcf.io
      parentRefs:
        - name: internal
          namespace: ingress-system
          sectionName: https

    tcpRoute:
      enabled: true
      parentRefs:
        - name: internal
          namespace: ingress-system
          sectionName: ssh

    signing:
      enabled: true
      ssh:
        existingSecret: forgejo-ssh-signing

    gitea:
      admin:
        existingSecret: forgejo-secret
      oauth:
        - name: cloudflare
          provider: openidConnect
          existingSecret: forgejo-oidc
          autoDiscoverUrl: https://mcfaul.cloudflareaccess.com/cdn-cgi/access/sso/oidc/6651192e1510b9ef791feb5efe0b742079c70cb3f25b183956bebdf6a6d50106/.well-known/openid-configuration
          scopes: openid email profile
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: FORGEJO__DATABASE__PASSWD
      config:
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgres-rw.forgejo-system.svc:5432
          NAME: forgejo
          USER: forgejo
        server:
          ROOT_URL: https://git.mcf.io
          SSH_DOMAIN: git.mcf.io
          SSH_PORT: 22
        service:
          REQUIRE_SIGNIN_VIEW: true
          DISABLE_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ENABLE_BASIC_AUTHENTICATION: false
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          USERNAME: email
          ACCOUNT_LINKING: login
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls
        # Dotted key: the chart's app.ini renderer only walks one level deep.
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/git/.ssh-signing/key.pub
          SIGNING_NAME: Forgejo [git.mcf.io]
          SIGNING_EMAIL: nobody@git.mcf.io
          INITIAL_COMMIT: always
          CRUD_ACTIONS: always
          MERGES: always
          WIKI: never
        mailer:
          ENABLED: false

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
