---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-internal
  annotations:
    # external-dns must NOT touch this: cloudflare's filter is mcf.io, so it
    # would publish git.mcf.io at the internal target and fight the away path.
    # The UniFi A record is managed manually.
    external-dns.alpha.kubernetes.io/controller: none
spec:
  hostnames:
    - git.mcf.io
  parentRefs:
    - name: internal
      namespace: ingress-system
      sectionName: https
  rules:
    - backendRefs:
        - name: forgejo-http
          port: 3000
