---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-oidc
    creationPolicy: Owner
  data:
    # Cloudflare Access-for-SaaS OIDC client credentials. The chart injects
    # these as GITEA_OAUTH_KEY_0 / GITEA_OAUTH_SECRET_0 (keys must be `key`
    # and `secret`) into the idempotent `add-oauth`/`update-oauth` init.
    - secretKey: key
      remoteRef:
        key: forgejo/oidc/client-id
    - secretKey: secret
      remoteRef:
        key: forgejo/oidc/client-secret
