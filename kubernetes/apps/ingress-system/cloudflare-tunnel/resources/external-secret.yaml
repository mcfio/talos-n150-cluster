---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-tunnel
    template:
      data:
        TUNNEL_TOKEN: |
          {{ toJson (dict "a" .account_id "t" .tunnel_id "s" .tunnel_secret) | b64enc }}
  data:
  - secretKey: account_id
    remoteRef:
      key: cloudflare/account/id
  - secretKey: tunnel_id
    remoteRef:
      key: cloudflare/tunnel/id
  - secretKey: tunnel_secret
    remoteRef:
      key: cloudflare/tunnel/secret
