---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &appname external-dns-unifi
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: external-dns
  values:
    fullnameOverride: *appname
    podAnnotations:
      secret.reloader.stakater.com/reload: *appname
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/home-operations/external-dns-unifi-webhook
          tag: 0.10.0@sha256:797aca0f9b4096fda964acc87bef05ded1000f2735482ac96703d7835dfda6de
        env:
        - name: UNIFI_HOST
          value: https://unifi
        - name: UNIFI_API_KEY
          valueFrom:
            secretKeyRef:
              name: *appname
              key: credential
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
    policy: sync
    sources:
    - gateway-httproute
    - service
    domainFilters:
    - milton.mcf.io
    - internal
    txtPrefix: k8s.
    txtOwnerId: home-cluster
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 90M
    serviceMonitor:
      enabled: true
