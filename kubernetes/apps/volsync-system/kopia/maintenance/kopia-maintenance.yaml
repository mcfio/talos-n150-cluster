---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  trigger:
    schedule: 30 */8 * * *
  moverVolumes:
  - mountPath: repository
    volumeSource:
      nfs:
        path: /archive
        server: 10.46.100.100 # Use IP instead of nfs-server.default.svc.cluster.local
  repository:
    repository: kopia
