---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  trigger:
    schedule: 30 */8 * * *
  moverVolumes:
  - mountPath: repository
    volumeSource:
      nfs:
        path: /archive
        server: nfs.internal
  repository:
    repository: kopia
