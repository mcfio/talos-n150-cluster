---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      searxng:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/searxng/searxng
              tag: 2026.7.1-c5d8d05f0@sha256:6c1e8797ba29a47d575dea4805e3138976bfe1333fab630418de03930bd14803
            env:
              SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
            envFrom:
              - secretRef:
                  name: searxng-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 977
        runAsGroup: 977
        fsGroup: 977
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: amd64
    service:
      app:
        ports:
          http:
            port: 8080
    configMaps:
      config:
        data:
          settings.yml: |
            # secret_key is supplied at runtime by the SEARXNG_SECRET env var
            # (external-secret) — the Python settings loader overrides it on load.
            use_default_settings: true
            general:
              debug: false
            server:
              limiter: false
            search:
              formats:
                - html
                - json
            engines:
              # Recall lever is engine breadth, not ranking. Enable two more
              # independent general/web indexes (both no-API-key, both merge
              # over bundled defaults by name via use_default_settings).
              - name: bing            # web index — biggest single recall gain
                disabled: false
              - name: mojeek          # independent crawler, real diversity
                disabled: false
              # Disabled — verified dead from this cluster's egress IPs:
              - name: brave           # returns HTTP 429 (throttled) → 0 results
                disabled: true
              - name: startpage       # www.startpage.com does not resolve here
                disabled: true
              - name: ahmia           # Tor onion index, needs a SOCKS proxy
                disabled: true
              - name: torch           # Tor onion index, needs a SOCKS proxy
                disabled: true
    persistence:
      config:
        type: configMap
        name: searxng
        advancedMounts:
          searxng:
            app:
              - path: /etc/searxng/settings.yml
                subPath: settings.yml
      # No /var/cache/searxng mount: the image ships that dir writable and
      # owned searxng:searxng (977). An emptyDir here only shadows it with a
      # root-owned mount (fsGroup sets gid, not uid) → the entrypoint's
      # non-root ownership warning. Root filesystem is writable (no
      # readOnlyRootFilesystem), and the instance is stateless, so the
      # built-in dir is all it needs.
