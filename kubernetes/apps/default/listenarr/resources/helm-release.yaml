---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: listenarr
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      listenarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          listenarr:
            image:
              repository: ghcr.io/listenarrs/listenarr
              tag: canary@sha256:c5a0bdba37042c7d89dd01b085e5ce5c5c025f00747801e80981b06f51c9dc75
            env:
              TZ: Canada/Eastern
              PUID: "568"
              PGID: "568"
              UMASK: "022"
              LISTENARR_PUBLIC_URL: https://listenarr.milton.mcf.io
              LISTENARR_LOG_LEVEL: Information
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 4545
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      listenarr:
        ports:
          http:
            port: *port
    route:
      listenarr:
        hostnames:
          - "{{ .Release.Name }}.milton.mcf.io"
        parentRefs:
          - name: internal
            namespace: ingress-system
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/config
      media:
        type: nfs
        server: 10.46.100.100 # Use IP instead of nfs-server.default.svc.cluster.local
        path: /media
      tmp:
        type: emptyDir
