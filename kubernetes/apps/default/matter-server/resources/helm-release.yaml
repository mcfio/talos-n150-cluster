---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/matter-js/matterjs-server
              tag: 1.2.8@sha256:cb5696f5d5584d63bcc22eea1565e21d0de9c41e86f212bf2fe5bce21f95897d
            env:
              TZ: Canada/Eastern
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "client-network",
            "namespace": "kube-system",
            "ips": ["192.168.10.22/24"],
            "mac": "2e:37:2e:6d:ab:4a"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        sysctls:
          - name: net.ipv6.conf.net1.accept_ra_rt_info_max_plen
            value: "64"
    service:
      app:
        ports:
          http:
            port: 5580
    persistence:
      config:
        existingClaim: matter-server
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
