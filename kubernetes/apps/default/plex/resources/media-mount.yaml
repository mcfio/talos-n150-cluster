---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-media
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  capacity:
    storage: 1Mi # doesn't matter, NFS ignores it
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  # Client tuning for mergerfs-over-NFS: an *arr replacing a file drops the
  # mergerfs node, so force a fresh LOOKUP per access instead of trusting a
  # readdirplus batch — otherwise Plex holds a stale handle (ESTALE) until it
  # is restarted. Delta over /etc/nfsmount.conf defaults.
  mountOptions:
    - hard
    - nordirplus
    - lookupcache=none
    - actimeo=20
  nfs:
    server: 10.46.100.100 # Use IP instead of nfs-server.default.svc.cluster.local
    path: /media
    readOnly: true
  claimRef:
    name: plex-media
    namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: plex-media
  resources:
    requests:
      storage: 1Mi # doesn't matter, NFS ignores it
