---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687@sha256:be00a2ad851ea3193cd870636f908eb6425ad89390f23cdb08daa35ab5cceacc
            env:
              TZ: Canada/Eastern
              PLEX_ADVERTISE_URL: https://{{ .Release.Name }}.mcf.io:443,http://192.168.46.120:32400,http://plex.default.svc.cluster.local:32400
              PLEX_NO_AUTH_NETWORKS: 192.168.0.0/16
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              claims:
              - name: gpu
              requests:
                cpu: 100m
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
    defaultPodOptions:
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: plex-gpu
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            url: https://plex.mcf.io
            group: external
            conditions: ["[STATUS] == 401"]
          # by eliminating the http-route source, this will only be managed by external-dns-cloudflare
          external-dns.alpha.kubernetes.io/hostname: "{{ .Release.Name }}.mcf.io"
          external-dns.alpha.kubernetes.io/target: ipv4.mcf.io
          lbipam.cilium.io/ips: 192.168.46.110
        type: LoadBalancer
        ports:
          http:
            port: *port
            appProtocol: HTTPS
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
        - path: /config/Library/Application Support/Plex Media Server
      media:
        type: nfs
        server: 10.46.100.100 # Use IP instead of nfs-server.default.svc.cluster.local
        path: /media
        globalMounts:
        - path: /media
          readOnly: true
      tmp:
        type: emptyDir
