---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: litellm
  values:
    strategy:
      type: Recreate
    db:
      useExisting: true
      database: app
      url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
      secret:
        name: litellm-db-cluster-app
        usernameKey: username
        passwordKey: password
        endpointKey: host
      deployStandalone: false
    migrationJob:
      hooks:
        helm:
          enabled: true
    envVars:
      GITHUB_COPILOT_TOKEN_DIR: /cache/copilot
    nodeSelector:
      kubernetes.io/arch: amd64
    masterkeySecretName: litellm-masterkey
    masterkeySecretKey: masterkey
    proxy_config:
      model_list:
      - model_name: github_copilot/*
        litellm_params:
          model: github_copilot/*
      litellm_settings:
        drop_params: true
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
    volumes:
    - name: litellm-cache
      persistentVolumeClaim:
        claimName: litellm-cache
    volumeMounts:
    - name: litellm-cache
      mountPath: /cache
