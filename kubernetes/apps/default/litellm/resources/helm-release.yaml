---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: litellm
  timeout: 10m
  values:
    image:
      repository: ghcr.io/berriai/litellm
    db:
      deployStandalone: false
    migrationJob:
      enabled: false
    envVars:
      GITHUB_COPILOT_TOKEN_DIR: /cache/copilot
    environmentSecrets:
      - litellm-env
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    masterkeySecretName: litellm-env
    masterkeySecretKey: masterkey
    proxy_config:
      model_list:
        # ── Anthropic models (dashed alias in → dotted Copilot slug out) ──
        - model_name: claude-opus-4-8
          litellm_params:
            model: github_copilot/claude-opus-4.8
        - model_name: claude-opus-4-7
          litellm_params:
            model: github_copilot/claude-opus-4.7
        - model_name: claude-opus-4-6
          litellm_params:
            model: github_copilot/claude-opus-4.6
        - model_name: claude-sonnet-4-6
          litellm_params:
            model: github_copilot/claude-sonnet-4.6

        # ── Background / haiku-alias target: 0× premium ──
        - model_name: gpt-5-mini
          litellm_params:
            model: github_copilot/gpt-5-mini

        # -- Define catch all alias for all GitHub Copilot models
        - model_name: github_copilot/*
          litellm_params:
            model: github_copilot/*
      litellm_settings:
        disable_copilot_system_to_assistant: true
        drop_params: true
        require_auth_for_metrics_endpoint: false
        callbacks:
          - websearch_interception
          - prometheus
        websearch_interception_params:
          enabled_providers:
            - github_copilot
          search_tool_name: default-search
      search_tools:
        - search_tool_name: default-search
          litellm_params:
            search_provider: tavily
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
    volumes:
      - name: litellm-cache
        persistentVolumeClaim:
          claimName: litellm-cache
    volumeMounts:
      - name: litellm-cache
        mountPath: /cache
