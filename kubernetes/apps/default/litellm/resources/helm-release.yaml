---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: litellm
  timeout: 10m
  values:
    strategy:
      type: Recreate
    db:
      useExisting: true
      database: app
      url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
      secret:
        name: litellm-db-cluster-app
        usernameKey: username
        passwordKey: password
        endpointKey: host
      deployStandalone: false
    migrationJob:
      hooks:
        helm:
          enabled: true
    envVars:
      GITHUB_COPILOT_TOKEN_DIR: /cache/copilot
    nodeSelector:
      kubernetes.io/arch: amd64
    masterkeySecretName: litellm-masterkey
    masterkeySecretKey: masterkey
    proxy_config:
      model_list:
        # ── Anthropic models (dashed alias in → dotted Copilot slug out) ──
        - model_name: claude-opus-4-8
          litellm_params:
            model: github_copilot/claude-opus-4.8
        - model_name: claude-opus-4-7
          litellm_params:
            model: github_copilot/claude-opus-4.7
        - model_name: claude-opus-4-6
          litellm_params:
            model: github_copilot/claude-opus-4.6
        - model_name: claude-sonnet-4-6
          litellm_params:
            model: github_copilot/claude-sonnet-4.6

        # ── Background / haiku-alias target: 0× premium ──
        - model_name: gpt-5-mini
          litellm_params:
            model: github_copilot/gpt-5-mini

        # -- Define catch all alias for all GitHub Copilot models
        - model_name: github_copilot/*
          litellm_params:
            model: github_copilot/*
      litellm_settings:
        # CRITICAL: keep Claude Code's system prompt intact.
        # Default (false) rewrites every system msg → assistant and wrecks the agent.
        disable_copilot_system_to_assistant: true

        # Silently drop provider-unsupported params instead of 400-ing.
        # Safety net for the thinking/adaptive params CC sends on 4.6-class models.
        drop_params: true

        # Intercept Claude Code's server-side `web_search` tool (which Copilot
        # rejects → "tools are required when tool choice is specified") and run
        # the query against self-hosted SearXNG instead. See LiteLLM #25477.
        callbacks:
          - websearch_interception
        websearch_interception_params:
          # Must be explicit — omitting this defaults to ["bedrock"], not all.
          enabled_providers:
            - github_copilot
          search_tool_name: default-search
      # Sibling of litellm_settings. `api_base` is the SearXNG provider's URL
      # param (source-verified, 1.90.2); it auto-appends /search & format=json.
      search_tools:
        - search_tool_name: default-search
          litellm_params:
            search_provider: searxng
            api_base: http://searxng.default.svc.cluster.local:8080
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
    volumes:
      - name: litellm-cache
        persistentVolumeClaim:
          claimName: litellm-cache
    volumeMounts:
      - name: litellm-cache
        mountPath: /cache
