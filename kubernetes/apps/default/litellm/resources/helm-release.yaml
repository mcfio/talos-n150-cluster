---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: litellm
  values:
    strategy:
      type: Recreate
    db:
      useExisting: true
      database: app
      url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
      secret:
        name: litellm-db-cluster-app
        usernameKey: username
        passwordKey: password
        endpointKey: host
      deployStandalone: false
    envVars:
      GITHUB_COPILOT_TOKEN_DIR: /cache/copilot
    nodeSelector:
      kubernetes.io/arch: amd64
    masterkeySecretName: litellm-masterkey
    masterkeySecretKey: masterkey
    proxy_config:
      model_list:
      - model_name: "github_copilot/*"
        litellm_params:
          model: "github_copilot/*"
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: github_copilot/claude-sonnet-4.6
          drop_params: true
      - model_name: claude-opus-4-6
        litellm_params:
          model: github_copilot/claude-opus-4.6
          drop_params: true
      - model_name: claude-opus-4-7
        litellm_params:
          model: github_copilot/claude-opus-4.7
          drop_params: true
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: github_copilot/claude-haiku-4.5
          drop_params: true
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
    volumes:
    - name: litellm-cache
      persistentVolumeClaim:
        claimName: litellm-cache
    volumeMounts:
    - name: litellm-cache
      mountPath: /cache
