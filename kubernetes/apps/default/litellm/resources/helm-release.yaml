---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: litellm
  timeout: 10m
  values:
    image:
      repository: ghcr.io/berriai/litellm
    db:
      deployStandalone: false
    migrationJob:
      enabled: false
    envVars:
      GITHUB_COPILOT_TOKEN_DIR: /cache/copilot
    environmentSecrets:
      - litellm-env
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    masterkeySecretName: litellm-env
    masterkeySecretKey: masterkey
    proxy_config:
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY

      litellm_settings:
        drop_params: true
        callbacks:
          - websearch_interception
          - prometheus
        websearch_interception_params:
          enabled_providers:
            - github_copilot
          search_tool_name: tavily-search
        require_auth_for_metrics_endpoint: false
        disable_copilot_system_to_assistant: true

      search_tools:
        - search_tool_name: tavily-search
          litellm_params:
            search_provider: tavily
            api_key: os.environ/TAVILY_API_KEY

      model_list:
        - model_name: github_copilot/*
          litellm_params:
            model: github_copilot/*
          model_info: &z
            cache_read_input_token_cost: 0
            cache_creation_input_token_cost: 0
        - model_name: default
          litellm_params:
            model: github_copilot/claude-opus-4.8
          model_info: *z
        - model_name: claude-opus-4-8
          litellm_params:
            model: github_copilot/claude-opus-4.8
          model_info: *z
        - model_name: claude-opus-4-7
          litellm_params:
            model: github_copilot/claude-opus-4.7
          model_info: *z
        - model_name: claude-opus-4-6
          litellm_params:
            model: github_copilot/claude-opus-4.6
          model_info: *z
        - model_name: claude-opus-4-6-1m
          litellm_params:
            model: github_copilot/claude-opus-4.6
          model_info: *z
        - model_name: claude-sonnet-4-6
          litellm_params:
            model: github_copilot/claude-sonnet-4.6
          model_info: *z
        - model_name: claude-sonnet-4-5
          litellm_params:
            model: github_copilot/claude-sonnet-4.6
          model_info: *z
        - model_name: claude-sonnet-5
          litellm_params:
            model: github_copilot/claude-sonnet-4.6
          model_info: *z
        - model_name: claude-haiku-4-5
          litellm_params:
            model: github_copilot/claude-sonnet-4.6
          model_info: *z
        - model_name: claude-haiku-4-5-20251001
          litellm_params:
            model: github_copilot/claude-sonnet-4.6
          model_info: *z

      router_settings:
        default_fallbacks:
          - claude-sonnet-4-6
    volumes:
      - name: litellm-cache
        persistentVolumeClaim:
          claimName: litellm-cache
    volumeMounts:
      - name: litellm-cache
        mountPath: /cache
