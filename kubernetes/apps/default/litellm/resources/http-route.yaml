---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
spec:
  hostnames:
  - litellm.milton.mcf.io
  parentRefs:
  - name: internal
    namespace: ingress-system
  rules:
  - backendRefs:
    - name: litellm
      namespace: default
      port: 4000
    matches:
    - path:
        type: PathPrefix
        value: /
