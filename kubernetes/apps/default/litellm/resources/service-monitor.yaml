---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: litellm
spec:
  jobLabel: litellm
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      honorLabels: true
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
