---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/tags/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-server
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    configMaps:
      media-config:
        data:
          media-config.ini: |
            never-forget-nodes=true
            inodecalc=path-hash
            moveonenospc=true
            category.create=mfs
            func.mkdir=pfrd
            minfreespace=50G
            fsname=mergerfs-media
          exports: |
            /srv            *(rw,async,fsid=0,crossmnt,no_subtree_check)
            /srv/media      *(rw,async,fsid=fb660590-30e3-47c0-8c4a-4d46b003d57b,no_subtree_check,all_squash,anonuid=568,anongid=568)
            /srv/archive    *(rw,async,fsid=b0d94358-518b-11f1-bb0d-2ccf674de4ba,no_subtree_check,all_squash,anonuid=1000,anongid=1000)
    controllers:
      nfs-server:
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-flq-ey7
          priorityClassName: system-cluster-critical
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          terminationGracePeriodSeconds: 60
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
        containers:
          mergerfs:
            image:
              repository: ghcr.io/trapexit/mergerfs
              tag: 2.42.0
            args:
              - -f
              - -o config=/etc/mergerfs/media/config.ini
              - /mnt/disks/media-disk*/media
              - /srv/media
            lifecycle:
              preStop:
                exec:
                  command:
                    - umount
                    - -l
                    - /srv/media
            securityContext:
              privileged: true
          nfsd:
            dependsOn: mergerfs
            image:
              repository: quay.io/aminvakil/alpine-nfs-server
              tag: latest@sha256:9245af667027198a654a5856cf622821234b7f41420cdc2af8bd3946e0e463a3
            env:
              EXPORTS_MOUNTED: "true"
            securityContext:
              capabilities:
                add:
                  - DAC_READ_SEARCH
                  - NET_BIND_SERVICE
                  - SYS_ADMIN
            lifecycle:
              preStop:
                exec:
                  command:
                    - sh
                    - -c
                    - exportfs -ua; killall -TERM rpc.nfsd; sleep 5
    service:
      main:
        controller: nfs-server
        type: ClusterIP
        clusterIP: 10.46.100.100
        ports:
          nfs:
            port: 2049
            protocol: TCP
    persistence:
      mergerfs-config:
        type: configMap
        name: nfs-server
        advancedMounts:
          nfs-server:
            mergerfs:
              - path: /etc/mergerfs/media/config.ini
                subPath: media-config.ini
      nfsd-config:
        type: configMap
        name: nfs-server
        advancedMounts:
          nfs-server:
            nfsd:
              - path: /etc/exports
                subPath: exports
      host-disks:
        type: hostPath
        hostPath: /var/mnt
        advancedMounts:
          nfs-server:
            mergerfs:
              - path: /mnt/disks
      exports:
        type: emptyDir
        globalMounts:
          - path: /srv
      archive:
        type: hostPath
        hostPath: /var/mnt/media-disk1/archive
        advancedMounts:
          nfs-server:
            nfsd:
              - path: /srv/archive
      media:
        type: emptyDir
        advancedMounts:
          nfs-server:
            mergerfs:
              - path: /srv/media
                mountPropagation: Bidirectional
            nfsd:
              - path: /srv/media
                mountPropagation: HostToContainer
