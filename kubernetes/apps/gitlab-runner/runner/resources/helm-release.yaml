---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner
spec:
  interval: 12h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.86.0
      sourceRef:
        kind: HelmRepository
        name: gitlab-charts
        namespace: gitlab-runner
  values:
    gitlabUrl: https://gitlab.com
    concurrent: 400
    terminationGracePeriodSeconds: 600
    rbac:
      create: true
    metrics:
      enabled: true
      podMonitor:
        enabled: true
    extraEnvFrom:
      CACHE_S3_ACCESS_KEY:
        secretKeyRef:
          name: gitlab-runner-cache
          key: AWS_ACCESS_KEY_ID
      CACHE_S3_SECRET_KEY:
        secretKeyRef:
          name: gitlab-runner-cache
          key: AWS_SECRET_ACCESS_KEY
    runners:
      name: talos-n150-cluster-runner
      secret: gitlab-runner
      privileged: false
      config: |
        [[runners]]
          request_concurrency = 2
          [runners.feature_flags]
            FF_DISABLE_UMASK_FOR_KUBERNETES_EXECUTOR = true
          [runners.kubernetes]
            namespace = "{{ default .Release.Namespace .Values.runners.jobNamespace }}"
            image = "alpine"
            allowed_pull_policies = ["always", "if-not-present", ""]
          [runners.cache]
            Type = "s3"
            [runners.cache.s3]
              ServerAddress = "rook-ceph-rgw-ceph-objectstore.rook-ceph.svc"
              BucketName = "cache-ca83acc5-3c78-4f6a-8ff6-8bd3d0d7ffbe"
              Insecure = false
