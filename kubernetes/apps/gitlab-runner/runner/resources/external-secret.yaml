---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    template:
      data:
        runner-registration-token: "" # needed for compatibility reasons
        runner-token: "{{ .credential }}"
  data:
  - secretKey: credential
    remoteRef:
      key: gitlab
      property: RUNNER_CREDENTIAL
    # remoteRef:
    #   key: gitlab/runner/credential
