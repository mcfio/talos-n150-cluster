---
# yaml-language-server: $schema=https://kubernetes-schemas.mcf.io/keda.sh/scaledobject_v1alpha1.json
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ${app}
spec:
  advanced:
    restoreToOriginalReplicaCount: true
  cooldownPeriod: 0
  minReplicaCount: 0
  maxReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${app}
  triggers:
  - type: kubernetes-workload
    metadata:
      podSelector: app.kubernetes.io/name=nfs-server
      value: "1"
