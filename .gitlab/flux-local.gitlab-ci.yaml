---
.flux-local:
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1 # necessary for git safe.directory
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $TEST_FLUX == "true"
  image:
    name: ghcr.io/allenporter/flux-local:v8.0.1
    entrypoint:
    - ""

flux-local:test:
  stage: test
  extends: .flux-local
  script:
  - flux-local test --all-namespaces --enable-helm --path "${CI_PROJECT_DIR}/kubernetes/flux/config" --verbose

flux-local:diff:
  stage: test
  extends: .flux-local
  parallel:
    matrix:
    - RESOURCES:
      - helmrelease
      - kustomization
  before_script:
  - echo "Working in current branch directory '$(pwd)'"
  - git worktree add default_branch_dir "${CI_DEFAULT_BRANCH}"
  - |
    flux-local diff "${RESOURCES}"
    --unified 6
    --path "${CI_PROJECT_DIR}/kubernetes/flux/config"
    --path-orig "${CI_PROJECT_DIR}/default_branch_dir/kubernetes/flux/config"
    --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
    --limit-bytes 10000
    --all-namespaces
    --sources "flux-system"
