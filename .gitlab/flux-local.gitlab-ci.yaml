---
.flux-local:
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1 # necessary for git safe.directory
  stage: flux-local
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $TEST_FLUX == "true"
  image:
    name: ghcr.io/allenporter/flux-local:v8.0.1
    entrypoint:
    - ""

flux-local:test:
  extends: .flux-local
  script:
  - flux-local test --all-namespaces --enable-helm --path "${CI_PROJECT_DIR}/kubernetes/flux/config" --verbose

flux-local:diff:
  extends: .flux-local
  parallel:
    matrix:
    - RESOURCES:
      - helmrelease
      - kustomization
  before_script:
  - git clone --depth=1 "${CI_PROJECT_URL}" "${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree"
  script:
  - echo "Path 1 - ${CI_PROJECT_DIR}/kubernetes/flux/config"
  - ls -lan "${CI_PROJECT_DIR}/kubernetes/flux/config"
  - echo "Path 2 - ${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree/kubernetes/flux/config"
  - ls -lan "${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree/kubernetes/flux/config"
  - env
  - flux-local diff "${RESOURCES}" --unified 6 --path /builds/mcfaul.cloud/GitOps/home-cluster/kubernetes/flux/config --path-orig /builds/main-worktree/kubernetes/flux/config --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart" --limit-bytes 10000 --all-namespaces --sources "flux-system"
