---
.flux-local:
  image:
    name: ghcr.io/allenporter/flux-local:v8.0.1
    entrypoint:
    - ""
  before_script:
  - git config --global --add safe.directory "${CI_PROJECT_DIR}"

flux-local-test:
  stage: test
  extends: .flux-local
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $TEST_FLUX == "true"
  script:
  - flux-local test --all-namespaces --enable-helm --path "${CI_PROJECT_DIR}" --verbose
