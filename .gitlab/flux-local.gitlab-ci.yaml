---
.flux-local:
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1 # necessary for git safe.directory
  stage: flux-local
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*
  image:
    name: ghcr.io/allenporter/flux-local:v8.0.1
    entrypoint:
    - ""

.flux-local-matrix:
  extends: .flux-local
  parallel:
    matrix:
    - RESOURCES:
      - helmrelease
      - kustomization

flux-local:test:
  extends:
  - .flux-local
  script:
  - >
    flux-local test
    --all-namespaces
    --enable-helm
    --path ${CI_PROJECT_DIR}/kubernetes/flux/config
    --verbose

flux-local:diff:
  extends:
  - .flux-local-matrix
  before_script:
  - git clone --depth=1 ${CI_PROJECT_URL} ${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree
  - mkdir -p ${CI_PROJECT_DIR}/diff_outputs
  script:
  - >
    flux-local diff "${RESOURCES}"
    --unified 6
    --path ${CI_PROJECT_DIR}/kubernetes/flux/config
    --path-orig ${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree/kubernetes/flux/config
    --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
    --limit-bytes 10000
    --all-namespaces
    --sources "flux-system"
    --output-file diff.output
  - echo '```diff' > ${CI_PROJECT_DIR}/diff_outputs/${RESOURCES}.md
  - cat diff.output | tee -a ${CI_PROJECT_DIR}/diff_outputs/${RESOURCES}.md
  - echo '```' >> ${CI_PROJECT_DIR}/diff_outputs/${RESOURCES}.md
  artifacts:
    paths:
    - $CI_PROJECT_DIR/diff_outputs/

flux-local:notes:
  stage: flux-local
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*
  needs:
  - job: flux-local:diff
    artifacts: true
  variables:
    GLAB_ENABLE_CI_AUTOLOGIN: 'true' # Experimental feature
  image: registry.gitlab.com/gitlab-org/cli:v1.82.0
  script:
  - echo $SHELL
  - ls -lah ${CI_PROJECT_DIR}/diff_outputs/
  - cat ${CI_PROJECT_DIR}/diff_outputs/*.md
  - glab mr note ${CI_MERGE_REQUEST_IID} --unique --message "$(cat ${CI_PROJECT_DIR}/diff_outputs/kustomization.md)"
  - glab mr note ${CI_MERGE_REQUEST_IID} --unique --message "$(cat ${CI_PROJECT_DIR}/diff_outputs/helmrelease.md)"
