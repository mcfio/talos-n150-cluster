---
.flux-local:
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1 # necessary for git safe.directory
  stage: flux-local
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  image:
    name: ghcr.io/allenporter/flux-local:v8.0.1
    entrypoint:
    - ""

.flux-local-matrix:
  extends: .flux-local
  parallel:
    matrix:
    - RESOURCES:
      - helmrelease
      - kustomization

flux-local:test:
  extends:
  - .flux-local
  script:
  - >
    flux-local test
    --all-namespaces
    --enable-helm
    --path "${CI_PROJECT_DIR}/kubernetes/flux/config"
    --verbose

flux-local:diff:
  extends:
  - .flux-local-matrix
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*
  before_script:
  - git clone --depth=1 "${CI_PROJECT_URL}" "${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree"
  - mkdir -p "${CI_PROJECT_DIR}/diff_outputs"
  script:
  - >
    flux-local diff "${RESOURCES}"
    --unified 6
    --path "${CI_PROJECT_DIR}/kubernetes/flux/config"
    --path-orig "${CI_BUILDS_DIR}/${CI_DEFAULT_BRANCH}-worktree/kubernetes/flux/config"
    --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart"
    --limit-bytes 10000
    --all-namespaces
    --sources "flux-system"
    --output-file "${CI_PROJECT_DIR}/diff_outputs/${RESOURCES}-diff.txt"
  artifacts:
    paths:
    - $CI_PROJECT_DIR/diff_outputs/

flux-local:notes:
  extends:
  - .flux-local
  needs:
  - job: flux-local:diff
    artifacts: true
  script:
  - cat "${CI_PROJECT_DIR}/diff_outputs/${RESOURCES}-diff.txt"
