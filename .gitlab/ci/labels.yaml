---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
#
# GitLab CI workflow for automatic MR labeling based on changed files
# This pipeline labels merge requests to help with triage and area identification
labels:
  stage: .pre
  extends: .mise
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true
  retry:
    max: 2
    when:
    - runner_system_failure
    - stuck_or_timeout_failure
  variables:
    GITLAB_TOKEN: $CI_BOT_JOB_TOKEN
  script: |
    git fetch --depth=1 origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    BASE_SHA="$(git rev-parse FETCH_HEAD)"
    CHANGED_FILES=$(git diff --name-only "${BASE_SHA}" HEAD)
    echo "Changed files vs ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}@${BASE_SHA}:"
    echo "$CHANGED_FILES"

    LABELS=()
    echo "$CHANGED_FILES" | grep -q "^kubernetes/"          && LABELS+=("area/kubernetes")
    echo "$CHANGED_FILES" | grep -q "^talos/"               && LABELS+=("area/talos")
    echo "$CHANGED_FILES" | grep -q "^bootstrap/"           && LABELS+=("area/bootstrap")
    echo "$CHANGED_FILES" | grep -qE "^\.gitlab/|\.gitlab-ci\.yaml" && LABELS+=("area/gitlab")
    echo "$CHANGED_FILES" | grep -qE "^\.renovate/|renovate\.json"  && LABELS+=("area/renovate")

    if [ ${#LABELS[@]} -gt 0 ]; then
      glab mr update "${CI_MERGE_REQUEST_IID}" --label "$(IFS=,; echo "${LABELS[*]}")" || true
      echo "Labeled: ${LABELS[*]}"
    else
      echo "No matching patterns"
    fi
