---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
#
# GitLab CI workflow for automatic MR labeling based on changed files
# This pipeline labels merge requests to help with triage and area identification
labels:
  stage: .pre
  extends: .mise
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true
  retry:
    max: 2
    when:
    - runner_system_failure
    - stuck_or_timeout_failure
  variables:
    GITLAB_TOKEN: $CI_BOT_JOB_TOKEN
  script:
  # Get the list of changed files in the MR
  - |
    if [ -n "$CI_MERGE_REQUEST_IID" ]; then
      CHANGED_FILES=$(git diff --name-only "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" HEAD)
    else
      echo "Not a merge request pipeline, skipping labeling"
      exit 0
    fi

  # Determine labels based on changed files
  - |
    echo "Changed files:"
    echo "$CHANGED_FILES"

    # Initialize a set of labels to add
    LABELS=()

    # Check for kubernetes changes
    if echo "$CHANGED_FILES" | grep -q "^kubernetes/"; then
      LABELS+=("area/kubernetes")
    fi

    # Check for talos changes
    if echo "$CHANGED_FILES" | grep -q "^talos/"; then
      LABELS+=("area/talos")
    fi

    # Check for bootstrap changes
    if echo "$CHANGED_FILES" | grep -q "^bootstrap/"; then
      LABELS+=("area/bootstrap")
    fi

    # Check for CI/CD changes
    if echo "$CHANGED_FILES" | grep -q "^\.gitlab/\|\.gitlab-ci\.yaml"; then
      LABELS+=("area/gitlab")
    fi

    # Check for renovate changes
    if echo "$CHANGED_FILES" | grep -q "^\.renovate/\|renovate\.json"; then
      LABELS+=("area/renovate")
    fi

    # Add labels if any were found
    if [ ${#LABELS[@]} -gt 0 ]; then
      glab mr update "${CI_MERGE_REQUEST_IID}" --label "$(IFS=,; echo "${LABELS[*]}")" || true
      echo "Successfully labeled MR with:  ${LABELS[*]}"
    else
      echo "No matching patterns found for labeling"
    fi
