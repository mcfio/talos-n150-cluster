---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
yamllint:
  stage: lint
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)
    changes:
    - "**/*.yaml"
    - "**/*.yml"
  allow_failure: true
  image: registry.gitlab.com/pipeline-components/yamllint:latest@sha256:5ab5eb7da0ed5e606b07c1723fc8b275e925189f70ac259b26b7329cb5f8f44d
  script:
  - yamllint --config-file .yamllint.yaml .

tomllint:
  stage: lint
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)
    changes:
    - "**/*.toml"
  allow_failure: true
  image:
    name: tamasfe/taplo:0.10.0
    entrypoint: [""]
  script:
  - taplo lint
  - taplo format --check
