---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
yamllint:
  stage: lint
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)
    changes:
    - "**/*.yaml"
    - "**/*.yml"
  allow_failure: true
  image: ghcr.io/jdx/mise:2026.5@sha256:5bb3311994fa78cef307ca3077cdb18f9551da0886371fc26ea91ab56220ffc5
  before_script:
  - mise install
  - export PATH="$(mise where --shims):$PATH"
  script:
  - yamllint --config-file .yamllint.yaml .

tomllint:
  stage: lint
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)
    changes:
    - "**/*.toml"
  allow_failure: true
  image: ghcr.io/jdx/mise:2026.5@sha256:5bb3311994fa78cef307ca3077cdb18f9551da0886371fc26ea91ab56220ffc5
  before_script:
  - mise install
  - export PATH="$(mise where --shims):$PATH"
  script:
  - taplo lint
  - taplo format --check
