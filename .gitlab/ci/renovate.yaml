---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
include:
- project: mcf.io/renovate-config
  file: /templates/renovate.gitlab-ci.yaml
- project: mcf.io/renovate-config
  file: /templates/renovate-config-validator.gitlab-ci.yaml

renovate-config-validator:
  variables:
    RENOVATE_CONFIG_VALIDATOR_EXTRA_FLAGS: .gitlab/renovate.json
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
    changes:
      paths:
      - .gitlab/renovate.json
      - "*.json"

renovate:
  variables:
    RENOVATE_AUTODISCOVER: true
    RENOVATE_AUTODISCOVER_FILTER: $CI_PROJECT_PATH
    FORCE_COLOR: 3
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  - if: $CI_PIPELINE_SOURCE == "web"
