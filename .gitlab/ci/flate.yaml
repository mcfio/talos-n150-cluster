---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
.flate:
  stage: test
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*.yaml

flate:diff:
  extends: .flate
  parallel:
    matrix:
    - RESOURCE:
      - kustomization
      - helmrelease
  image: ghcr.io/jdx/mise:2026.5@sha256:5bb3311994fa78cef307ca3077cdb18f9551da0886371fc26ea91ab56220ffc5
  variables:
    GIT_DEPTH: "0"
    FLATE_PATH: $CI_PROJECT_DIR/kubernetes/flux/config
    FLATE_CACHE_DIR: $CI_PROJECT_DIR/.cache/flate
    FLATE_OUTPUT: markdown
  before_script:
  - mise install github:home-operations/flate
  - eval "$(mise activate bash)"
  - mkdir -p "${CI_PROJECT_DIR}/diff_outputs"
  - git fetch --depth=1 origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
  script: |
    export FLATE_BASE="$(git rev-parse FETCH_HEAD)"
    echo "=== ENV ==="
    echo "FLATE_BASE=${FLATE_BASE}"
    echo "FLATE_PATH=${FLATE_PATH}"
    echo "HEAD=$(git rev-parse HEAD)"
    echo "TARGET_BRANCH=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    echo ""
    echo "=== git-level diff (baseline → HEAD) ==="
    git diff --stat "${FLATE_BASE}" HEAD
    echo ""
    echo "=== git-level diff scoped to kubernetes/ ==="
    git diff --name-only "${FLATE_BASE}" HEAD -- kubernetes/
    echo ""
    echo "=== what flate sees as the resource graph ==="
    flate get ks --path "${FLATE_PATH}" -o name
    echo ""
    echo "=== flate diff with explicit --base, verbose ==="
    flate diff "${RESOURCE}" --base "${FLATE_BASE}" -v \
      > "${CI_PROJECT_DIR}/diff_outputs/${RESOURCE}.md" \
      2> "${CI_PROJECT_DIR}/diff_outputs/${RESOURCE}.log"
    echo "--- stderr ---"
    cat "${CI_PROJECT_DIR}/diff_outputs/${RESOURCE}.log"
    echo "--- diff size ---"
    wc -l "${CI_PROJECT_DIR}/diff_outputs/${RESOURCE}.md"
  cache:
    key: flate-$CI_PROJECT_ID-$RESOURCE
    paths:
    - $CI_PROJECT_DIR/.cache/flate/
  artifacts:
    paths:
    - $CI_PROJECT_DIR/diff_outputs/

flate:notes:
  extends: .flate
  needs:
  - job: flate:diff
    artifacts: true
  image: registry.gitlab.com/gitlab-org/cli:v1.100.0@sha256:20245f07e48285c68bf2d047a065fd800aaf764cde21e37edebb2d55487bfc24
  variables:
    GITLAB_TOKEN: $CI_BOT_JOB_TOKEN
  script: |
    for resource in kustomization helmrelease; do
      if [[ -s "${CI_PROJECT_DIR}/diff_outputs/${resource}.md" ]]; then
        glab mr note "${CI_MERGE_REQUEST_IID}" --repo "${CI_PROJECT_PATH}" --unique --message "$(cat "${CI_PROJECT_DIR}/diff_outputs/${resource}.md")"
      fi
    done
