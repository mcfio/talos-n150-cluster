---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
flate:
  stage: test
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*.yaml
  parallel:
    matrix:
    - RESOURCE:
      - kustomization
      - helmrelease
  image: ghcr.io/jdx/mise:2026.5@sha256:5bb3311994fa78cef307ca3077cdb18f9551da0886371fc26ea91ab56220ffc5
  variables:
    GIT_DEPTH: "0"
    GITLAB_TOKEN: $CI_BOT_JOB_TOKEN
    FLATE_PATH: $CI_PROJECT_DIR/kubernetes/flux/config
    FLATE_OUTPUT: gitlab
  before_script:
  - mise install github:home-operations/flate
  - mise install glab
  - mise install jq
  - eval "$(mise activate bash)"
  script: |
    diff_file="$(mktemp)"
    {
      echo '```diff'
      flate diff "${RESOURCE}"
      echo '```'
    } > "$diff_file"

    marker="<!-- flate:${RESOURCE} -->"
    body="${marker}"$'\n'"$(cat "$diff_file")"

    existing_id=$(
      glab mr note list ${CI_MERGE_REQUEST_IID} --format json \
        | jq -r --arg marker "$marker" \
            '.[] | .notes[] | select(.body | strings | contains($marker)) | .id // empty'
    )

    if [[ -n "$existing_id" ]]; then
      glab mr note update "${CI_MERGE_REQUEST_IID} "$existing_id" \
        --repo "${CI_PROJECT_PATH}" \
        --message "${body}"
    else
      glab mr note create "${CI_MERGE_REQUEST_IID}" \
        --resolvable false \
        --repo "${CI_PROJECT_PATH}" \
        --message "${body}"
    fi
