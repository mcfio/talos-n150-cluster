---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
flate:
  stage: test
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - kubernetes/**/*.yaml
  parallel:
    matrix:
    - RESOURCE:
      - kustomization
      - helmrelease
  image: $CI_MISE_IMAGE
  variables:
    GIT_DEPTH: "0"
    GITLAB_TOKEN: $CI_BOT_JOB_TOKEN
    FLATE_PATH: $CI_PROJECT_DIR/kubernetes/flux/config
    FLATE_OUTPUT: gitlab
  before_script:
  - mise install
  script: |
    raw="$(mktemp)"
    flate diff "${RESOURCE}" | sed '/./,$!d' > "$raw"

    if [[ ! -s "$raw" ]]; then
      echo "No diff for ${RESOURCE} — exiting cleanly"
      exit 0
    fi

    diff_file="$(mktemp)"
    {
      echo '```diff'
      cat "$raw"
      echo '```'
    } > "$diff_file"

    marker="<!-- flate:${RESOURCE} -->"
    body="${marker}"$'\n'"$(cat "$diff_file")"

    existing_id=$(
      glab mr note list "${CI_MERGE_REQUEST_IID}" --output json \
        | jq --raw-output --arg marker "$marker" \
            '.[] | .notes[] | select(.body | strings | contains($marker)) | .id // empty'
    )

    if [[ -n "$existing_id" ]]; then
      glab mr note update "${CI_MERGE_REQUEST_IID}" "$existing_id" \
        --repo "${CI_PROJECT_PATH}" \
        --message "${body}"
    else
      glab mr note create "${CI_MERGE_REQUEST_IID}" \
        --repo "${CI_PROJECT_PATH}" \
        --message "${body}" \
        --resolvable=false
    fi
