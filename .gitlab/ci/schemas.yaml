---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
.schemas:
  variables:
    UV_SYSTEM_PYTHON: 1
    GIT_STRATEGY: none
    OUTPUT_DIR: $CI_PROJECT_DIR/crdSchemas
  tags:
  - milton

# Generate JSON Schemas from CRDs
generate-schemas:
  stage: build
  extends: .schemas
  image:
    name: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:f661eb5c4ea5aae705674c4bc5052a4a0b5148db95452395dbececa1e9e7a1ec
    entrypoint: [""]
  before_script: |
    apk add --no-cache bash kubectl curl
    uv pip install pyyaml
    for file in crd-extractor.sh openapi2jsonschema.py; do
      curl --fail --silent --show-error --location --output ${CI_PROJECT_DIR}/${file} \
        https://raw.githubusercontent.com/datreeio/CRDs-catalog/82c9b58ad3e7294ba0c6a245f820f0870c099513/Utilities/${file}
    done
    chmod +x ${CI_PROJECT_DIR}/crd-extractor.sh
  script:
  - ${CI_PROJECT_DIR}/crd-extractor.sh
  artifacts:
    paths:
    - crdSchemas
    expire_in: 1w

# Publish Schemas to Cloudflare Pages
publish-schemas:
  stage: deploy
  extends: .schemas
  image:
    name: docker.io/library/node:24-alpine@sha256:01743339035a5c3c11a373cd7c83aeab6ed1457b55da6a69e014a95ac4e4700b
    entrypoint: [""]
  needs:
  - job: generate-schemas
    artifacts: true
  variables:
    NPM_CONFIG_CACHE: ${CI_PROJECT_DIR}/.npm
  cache:
    key:
      files:
      - package-lock.json
    paths:
    - .npm/
    - node_modules
  before_script: |
    npm install --cache .npm wrangler
    npx wrangler --version
  script:
  - npx wrangler pages deploy ./crdSchemas --project-name=crds --branch main
