---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
.schemas:
  variables:
    UV_SYSTEM_PYTHON: 1
    GIT_STRATEGY: none
    OUTPUT_DIR: $CI_PROJECT_DIR/crdSchemas
  tags:
  - milton

# Generate JSON Schemas from CRDs
generate-schemas:
  stage: build
  extends: .schemas
  image:
    name: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:b1a5e1762cfd7ac945fb842cda00c4997190263eb782b2283860d45c64ec015d
    entrypoint: [""]
  before_script: |
    apk add --no-cache bash kubectl curl
    uv pip install pyyaml
    for file in crd-extractor.sh openapi2jsonschema.py; do
      curl --fail --silent --show-error --location --output ${CI_PROJECT_DIR}/${file} \
        https://raw.githubusercontent.com/datreeio/CRDs-catalog/82c9b58ad3e7294ba0c6a245f820f0870c099513/Utilities/${file}
    done
    chmod +x ${CI_PROJECT_DIR}/crd-extractor.sh
  script:
  - ${CI_PROJECT_DIR}/crd-extractor.sh
  artifacts:
    paths:
    - $CI_PROJECT_DIR/crdSchemas
    expire_in: 1 week

# Publish Schemas to Cloudflare Pages
publish-schemas:
  stage: deploy
  extends: .schemas
  image:
    name: docker.io/library/node:24-alpine@sha256:7fddd9ddeae8196abf4a3ef2de34e11f7b1a722119f91f28ddf1e99dcafdf114
    entrypoint: [""]
  needs:
  - job: generate-schemas
    artifacts: true
  before_script: |
    npm install --global wrangler
    wrangler --version
  script: |
    cd $CI_PROJECT_DIR/crdSchemas
    npx wrangler pages deploy --project-name=crds --branch main .
