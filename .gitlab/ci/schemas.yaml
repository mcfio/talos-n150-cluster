---
# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
.schemas:
  variables:
    UV_SYSTEM_PYTHON: 1
    GIT_STRATEGY: none
    OUTPUT_DIR: $CI_PROJECT_DIR/crdSchemas

# Generate YAML Schemas from CRDs
generate-schemas:
  stage: build
  extends:
  - .schemas
  tags:
  - milton
  image:
    name: ghcr.io/astral-sh/uv:python3.14-alpine@sha256:2d328eb17f7d6a8c3996d2de739e78b18c96a6b89ce72ee665a4aa06088ac629
    entrypoint:
    - ""
  before_script: |
    apk add --no-cache bash kubectl curl
    uv pip install pyyaml
    curl --fail --silent --show-error --location --remote-name --output-dir ${CI_PROJECT_DIR} \
      https://raw.githubusercontent.com/datreeio/CRDs-catalog/82c9b58ad3e7294ba0c6a245f820f0870c099513/Utilities/crd-extractor.sh \
      && chmod +x ${CI_PROJECT_DIR}/crd-extractor.sh
    curl --fail --silent --show-error --location --remote-name --output-dir ${CI_PROJECT_DIR} \
      https://raw.githubusercontent.com/datreeio/CRDs-catalog/82c9b58ad3e7294ba0c6a245f820f0870c099513/Utilities/openapi2jsonschema.py
  script:
  - ${CI_PROJECT_DIR}/crd-extractor.sh
  artifacts:
    paths:
    - $CI_PROJECT_DIR/crdSchemas
    expire_in: 1 week

# Publish Schemas to Cloudflare Pages
publish-schemas:
  stage: deploy
  extends:
  - .schemas
  tags:
  - milton
  image:
    name: docker.io/library/node:24-alpine@sha256:7fddd9ddeae8196abf4a3ef2de34e11f7b1a722119f91f28ddf1e99dcafdf114
    entrypoint:
    - ""
  needs:
  - job: generate-schemas
    artifacts: true
  before_script: |
    npm install --global wrangler
    wrangler --version
  script: |
    cd $CI_PROJECT_DIR/crdSchemas
    npx wrangler pages deploy --project-name=crds --branch main .
